<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Linjo Business - Dashboard</title>
  <style>
    :root{--bg:#0f172a;--card:#fff;--muted:#64748b;--dark:#111827;--blue:#2563eb;--green:#16a34a;--soft:#f8fafc;--line:#e2e8f0}
    body{font-family:Arial,sans-serif;background:var(--bg);margin:0;padding:22px;color:var(--dark)}
    .wrap{max-width:1180px;margin:0 auto}h1{color:white;margin:0 0 6px;font-size:36px}h2{margin-top:0;font-size:24px}.muted{color:#cbd5e1;margin-bottom:20px;font-size:17px}
    .panel{background:var(--card);border-radius:22px;padding:22px;margin-bottom:20px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    .settings-summary{cursor:pointer;font-size:24px;font-weight:800;list-style:none;display:flex;justify-content:space-between;gap:12px;align-items:center}.settings-summary::-webkit-details-marker{display:none}.settings-summary::after{content:"Avaa asetukset";background:var(--bg);color:white;font-size:15px;padding:10px 14px;border-radius:999px;white-space:nowrap}details[open] .settings-summary::after{content:"Piilota asetukset"}.settings-content{margin-top:20px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.grid-1{display:grid;grid-template-columns:1fr;gap:16px}.box{background:var(--soft);border:1px solid var(--line);border-radius:18px;padding:16px}label{font-weight:800;display:block;margin-bottom:7px}
    input,textarea,select{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:12px;padding:11px;font-size:15px;margin-bottom:12px;font-family:Arial,sans-serif;background:white}textarea{min-height:86px;resize:vertical}.big-textarea{min-height:135px}
    .active-row{margin:12px 0 18px;display:flex;gap:10px;flex-wrap:wrap}.active-option{background:#eef2ff;border-radius:999px;padding:10px 14px;display:flex;align-items:center;gap:8px;font-weight:700}.buttons{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    button,.call-link{border:none;padding:11px 16px;border-radius:999px;color:white;font-size:15px;font-weight:800;cursor:pointer;text-decoration:none;display:inline-block}.blue{background:var(--blue)}.green{background:var(--green)}.dark{background:var(--bg)}.light{background:#e2e8f0;color:#0f172a}.save-status{color:#475569;font-weight:800}
    .toolbar{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px;color:white}.tabs{display:flex;gap:10px;flex-wrap:wrap}.tab{background:#1e293b;color:white;border:1px solid #334155;padding:10px 15px;border-radius:999px;font-weight:800;cursor:pointer}.tab.active{background:white;color:#0f172a}.count{background:#334155;color:white;border-radius:999px;padding:2px 8px;margin-left:6px;font-size:13px}.tab.active .count{background:#e2e8f0;color:#0f172a}
    .card{background:#fff;border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 6px 18px rgba(0,0,0,.18)}.card.handled{opacity:.82}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:10px}.title{font-size:21px;font-weight:800;margin:0}.pill{background:#e0f2fe;color:#075985;padding:8px 12px;border-radius:999px;font-weight:800;font-size:14px;white-space:nowrap}.line{font-size:15px;margin:7px 0;line-height:1.35}.line strong{font-weight:800}.details{margin-top:10px;border-top:1px solid #e5e7eb;padding-top:10px}.details summary{cursor:pointer;font-weight:800;color:#2563eb}.empty{background:white;border-radius:18px;padding:20px;font-size:17px}
    @media(max-width:850px){body{padding:14px}h1{font-size:30px}.grid{grid-template-columns:1fr}.top,.toolbar{flex-direction:column;align-items:flex-start}.card,.panel{padding:18px}.title{font-size:20px}.line{font-size:15px}.settings-summary{font-size:21px}.settings-summary::after{font-size:13px}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Linjo Business</h1><div class="muted">AI-puhelinassistentti yritykselle</div>
    <details class="panel"><summary class="settings-summary">Asetukset</summary><div class="settings-content">
      <h2>Yrityksen asetukset</h2>
      <div class="grid"><div class="box">
        <label>Yrityksen nimi</label><input id="companyName" placeholder="Esim. Parturi-Kampaamo Malli Oy">
        <label>Verkkosivun osoite</label><input id="websiteUrl" placeholder="https://www.yritys.fi">
        <label>Vastaustyyli</label><input id="tone" placeholder="selkeä, ystävällinen ja ammattimainen">
        <label>Lopetuslause</label><textarea id="closing"></textarea>
      </div><div class="box">
        <label>Aukioloajat</label><textarea id="openingHours"></textarea>
        <label>Osoite</label><textarea id="address"></textarea>
        <label>Ajanvarausohjeet</label><textarea id="bookingInstructions"></textarea>
        <label>Jos AI ei tiedä vastausta</label><textarea id="fallbackInstruction"></textarea>
      </div></div>
      <div class="grid-1" style="margin-top:16px"><div class="box">
        <label>Palvelut</label><textarea id="services" class="big-textarea"></textarea>
        <label>Hinnat / hintatiedot</label><textarea id="prices" class="big-textarea"></textarea>
        <label>Usein kysytyt kysymykset</label><textarea id="faq" class="big-textarea"></textarea>
        <label>Verkkosivulta haettu tietopankki</label><textarea id="websiteKnowledge" class="big-textarea" placeholder="Voit hakea tiedot verkkosivulta painikkeella tai kirjoittaa käsin."></textarea>
        <div class="buttons"><button class="blue" onclick="scrapeWebsite()">Hae tiedot verkkosivulta</button><button class="dark" onclick="saveSettings()">Tallenna yrityksen asetukset</button><span id="settingsStatus" class="save-status"></span></div>
      </div></div>
      <div class="panel" style="box-shadow:none;border:1px solid #e2e8f0;margin-top:18px;margin-bottom:0"><h2>Assistentin vastaustavat</h2><p>Valitse aktiivinen avausviesti ja muokkaa kolmea eri tilannetta.</p>
        <div class="active-row"><label class="active-option"><input type="radio" name="activeReply" value="reply1"><span id="reply1RadioName">Vastaus 1</span></label><label class="active-option"><input type="radio" name="activeReply" value="reply2"><span id="reply2RadioName">Vastaus 2</span></label><label class="active-option"><input type="radio" name="activeReply" value="reply3"><span id="reply3RadioName">Vastaus 3</span></label></div>
        <div class="grid"><div class="box"><label>Vastaustavan nimi 1</label><input id="reply1Name"><label>Vastausviesti 1</label><textarea id="reply1Message"></textarea></div><div class="box"><label>Vastaustavan nimi 2</label><input id="reply2Name"><label>Vastausviesti 2</label><textarea id="reply2Message"></textarea></div><div class="box"><label>Vastaustavan nimi 3</label><input id="reply3Name"><label>Vastausviesti 3</label><textarea id="reply3Message"></textarea></div></div>
        <div class="buttons"><button class="dark" onclick="saveSettings()">Tallenna vastaustavat</button></div>
      </div>
    </div></details>
    <div class="toolbar"><div class="tabs"><button id="openTab" class="tab active" onclick="setView('open')">Avoimet <span id="openCount" class="count">0</span></button><button id="handledTab" class="tab" onclick="setView('handled')">Hoidetut <span id="handledCount" class="count">0</span></button></div><button class="light" onclick="loadCalls()">Päivitä</button></div>
    <div id="calls">Ladataan...</div>
  </div>
  <script>
    const el=document.getElementById("calls"),settingsStatus=document.getElementById("settingsStatus");let allCalls=[],currentView="open";
    const defaultSettings={activeReply:"reply1",company:{name:"",websiteUrl:"",tone:"selkeä, ystävällinen ja ammattimainen",closing:"Kiitos soitosta. Välitän asian tarvittaessa eteenpäin. Hei hei.",fallbackInstruction:"Jos et tiedä vastausta varmasti, älä keksi. Pyydä soittajaa jättämään nimi ja asia."},businessInfo:{openingHours:"",address:"",services:"",prices:"",bookingInstructions:"",faq:"",websiteKnowledge:""},replies:{reply1:{name:"Yleinen asiakaspalvelu",message:"Hei, olet yhteydessä yrityksen tekoälyavustajaan. Kerro lyhyesti, miten voin auttaa."},reply2:{name:"Kiireinen hetki",message:"Hei, yrityksessä on juuri kiireinen hetki. Kerro lyhyesti nimesi ja asiasi, niin välitän viestin eteenpäin."},reply3:{name:"Suljettu",message:"Hei, yritys on tällä hetkellä suljettu. Kerro nimesi ja asiasi, niin välitän viestin eteenpäin."}}};
    function esc(v){return String(v??"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]))}function setValue(id,value){const i=document.getElementById(id);if(i)i.value=value||""}function getValue(id){return document.getElementById(id)?.value||""}function setText(id,value){const i=document.getElementById(id);if(i)i.textContent=value||""}function updateRadioNames(){setText("reply1RadioName",getValue("reply1Name")||"Vastaus 1");setText("reply2RadioName",getValue("reply2Name")||"Vastaus 2");setText("reply3RadioName",getValue("reply3Name")||"Vastaus 3")}function getActiveReply(){return document.querySelector('input[name="activeReply"]:checked')?.value||"reply1"}function mergeSettings(d){return{...defaultSettings,...d,company:{...defaultSettings.company,...(d.company||{})},businessInfo:{...defaultSettings.businessInfo,...(d.businessInfo||{})},replies:{...defaultSettings.replies,...(d.replies||{})}}}
    async function loadSettings(){try{const res=await fetch("/api/settings"),data=res.ok?await res.json():{},s=mergeSettings(data);setValue("companyName",s.company.name);setValue("websiteUrl",s.company.websiteUrl);setValue("tone",s.company.tone);setValue("closing",s.company.closing);setValue("fallbackInstruction",s.company.fallbackInstruction);setValue("openingHours",s.businessInfo.openingHours);setValue("address",s.businessInfo.address);setValue("services",s.businessInfo.services);setValue("prices",s.businessInfo.prices);setValue("bookingInstructions",s.businessInfo.bookingInstructions);setValue("faq",s.businessInfo.faq);setValue("websiteKnowledge",s.businessInfo.websiteKnowledge);setValue("reply1Name",s.replies.reply1.name);setValue("reply1Message",s.replies.reply1.message);setValue("reply2Name",s.replies.reply2.name);setValue("reply2Message",s.replies.reply2.message);setValue("reply3Name",s.replies.reply3.name);setValue("reply3Message",s.replies.reply3.message);const radio=document.querySelector(`input[name="activeReply"][value="${s.activeReply||"reply1"}"]`);if(radio)radio.checked=true;updateRadioNames()}catch(e){console.error(e);settingsStatus.textContent="Asetusten lataus epäonnistui."}}
    function buildPayload(){return{activeReply:getActiveReply(),company:{name:getValue("companyName"),websiteUrl:getValue("websiteUrl"),tone:getValue("tone"),closing:getValue("closing"),fallbackInstruction:getValue("fallbackInstruction")},businessInfo:{openingHours:getValue("openingHours"),address:getValue("address"),services:getValue("services"),prices:getValue("prices"),bookingInstructions:getValue("bookingInstructions"),faq:getValue("faq"),websiteKnowledge:getValue("websiteKnowledge")},replies:{reply1:{name:getValue("reply1Name"),message:getValue("reply1Message")},reply2:{name:getValue("reply2Name"),message:getValue("reply2Message")},reply3:{name:getValue("reply3Name"),message:getValue("reply3Message")}}}}
    async function saveSettings(){try{updateRadioNames();settingsStatus.textContent="Tallennetaan...";const res=await fetch("/api/settings",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(buildPayload())});if(!res.ok)throw new Error("Tallennus epäonnistui");settingsStatus.textContent="Tallennettu ✅"}catch(e){console.error(e);settingsStatus.textContent="Tallennus epäonnistui."}}
    async function scrapeWebsite(){try{settingsStatus.textContent="Haetaan tietoja verkkosivulta...";const res=await fetch("/api/scrape-website",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({websiteUrl:getValue("websiteUrl")})}),data=await res.json();if(!res.ok)throw new Error(data.details||"Haku epäonnistui");setValue("websiteKnowledge",data.websiteKnowledge||"");settingsStatus.textContent="Verkkosivun tiedot haettu ✅"}catch(e){console.error(e);settingsStatus.textContent="Verkkosivun tietojen haku epäonnistui."}}
    function formatDate(c){if(c?._seconds)return new Date(c._seconds*1000).toLocaleString("fi-FI");if(c?.seconds)return new Date(c.seconds*1000).toLocaleString("fi-FI");if(typeof c==="string")return new Date(c).toLocaleString("fi-FI");return""}function fullPhone(d){return d.from||d.phone||d.callerNumber||d.number||d.fromMasked||"Tuntematon"}function isHandled(d){return d.status==="handled"||d.status==="hoidettu"}function setView(v){currentView=v;document.getElementById("openTab").classList.toggle("active",v==="open");document.getElementById("handledTab").classList.toggle("active",v==="handled");renderCalls()}
    async function markHandled(id){try{const res=await fetch(`/api/calls/${encodeURIComponent(id)}/status`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({status:"handled"})});if(!res.ok)throw new Error("Merkintä epäonnistui");const c=allCalls.find(x=>x.id===id);if(c)c.status="handled";renderCalls()}catch(e){console.error(e);alert("Merkintä epäonnistui. Lisää server.js:ään status-reitti.")}}
    async function loadCalls(){try{const res=await fetch("/api/calls");allCalls=await res.json();if(!Array.isArray(allCalls))allCalls=[];renderCalls()}catch(e){console.error(e);el.innerHTML='<div class="empty">Puheluiden lataus epäonnistui.</div>'}}
    function renderCalls(){const open=allCalls.filter(d=>!isHandled(d)),handled=allCalls.filter(d=>isHandled(d));document.getElementById("openCount").textContent=open.length;document.getElementById("handledCount").textContent=handled.length;const calls=currentView==="handled"?handled:open;if(!calls.length){el.innerHTML=currentView==="handled"?'<div class="empty">Ei hoidettuja puheluita vielä.</div>':'<div class="empty">Ei avoimia puheluita.</div>';return}el.innerHTML=calls.map(d=>{const phone=fullPhone(d),tel=phone&&phone!=="Tuntematon"?`tel:${String(phone).replace(/\s/g,"")}`:"#",done=isHandled(d);return`<div class="card ${done?"handled":""}"><div class="top"><h2 class="title">${esc(d.category||d.label||"Puhelu")}</h2><div class="pill">${esc(d.priority||d.urgency||"keskitaso")}</div></div><div class="line"><strong>Aika:</strong> ${esc(formatDate(d.createdAt))}</div><div class="line"><strong>Soittaja:</strong> ${esc(phone)}</div><div class="line"><strong>Suositus:</strong> ${esc(d.recommendedAction||d.action||"tarkista")}</div><div class="line"><strong>Yhteenveto:</strong> ${esc(d.summary||d.aiSummary||"Ei yhteenvetoa")}</div><details class="details"><summary>Näytä lisätiedot</summary><div class="line"><strong>Status:</strong> ${esc(d.status||"new")}</div><div class="line"><strong>Yritys:</strong> ${esc(d.companyName||"-")}</div><div class="line"><strong>AI:n vastaus:</strong> ${esc(d.assistantAnswer||"-")}</div><div class="line"><strong>Puheen sisältö:</strong> ${esc(d.transcript||d.message||d.speechText||d.userSpeech||"Ei puhesisältöä")}</div></details><div class="buttons"><a class="call-link blue" href="${esc(tel)}">Soita takaisin</a>${!done?`<button class="green" onclick="markHandled('${esc(d.id)}')">Merkitse hoidetuksi</button>`:""}</div></div>`}).join("")}
    document.addEventListener("input",updateRadioNames);loadSettings();loadCalls();
  </script>
</body>
</html>
